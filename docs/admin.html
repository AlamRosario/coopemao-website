<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Coopemao</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-blue-900 text-white min-h-screen p-5">
    
    <!-- LOGO + NOMBRE -->
    <div class="flex items-center gap-2 mb-10">
      <img src="assets/images/logo.svg" class="w-10 h-10">
      <h1 class="text-xl font-bold">COOPEMAO</h1>
    </div>

    <ul>
      <li class="mb-4">📊 Dashboard</li>
      <li class="mb-4">👥 Afiliaciones</li>
      <li class="mb-4">💰 Préstamos</li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 p-6">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Panel Administrativo</h1>
    </div>

    <!-- CARDS -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-white p-4 rounded shadow">
        <h2 class="text-gray-500">Afiliaciones</h2>
        <p id="totalAfiliaciones" class="text-2xl font-bold">0</p>
      </div>

      <div class="bg-white p-4 rounded shadow">
        <h2 class="text-gray-500">Préstamos</h2>
        <p id="totalPrestamos" class="text-2xl font-bold">0</p>
      </div>

      <div class="bg-white p-4 rounded shadow">
        <h2 class="text-gray-500">Monto total</h2>
        <p id="montoTotal" class="text-2xl font-bold">RD$0</p>
      </div>
    </div>

    <!-- AFILIACIONES -->
    <div class="bg-white p-4 rounded shadow mb-8">

      <div class="flex justify-between items-center mb-3">
        <h2 class="text-xl font-bold">Afiliaciones</h2>

        <button onclick="toggleHistorial()"
          class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">
          Ver historial
        </button>
      </div>

      <input 
        id="buscarAfiliacion"
        oninput="buscarAfiliacion()"
        placeholder="Buscar afiliado..."
        class="mb-3 p-2 border w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
      />

      <table class="w-full text-sm">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2">Nombre</th>
            <th>Cédula</th>
            <th>Teléfono</th>
            <th>Ocupación</th>
            <th>Estado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tablaAfiliaciones"></tbody>
      </table>

    </div>

    <!-- PRESTAMOS -->
    <div class="bg-white p-4 rounded shadow">

      <h2 class="text-xl font-bold mb-3">Solicitudes de Préstamo</h2>

      <input
        id="buscarPrestamo"
        oninput="buscarPrestamo()"
        placeholder="Buscar préstamo..."
        class="mb-3 p-2 border w-full rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
      />

      <table class="w-full text-sm">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2">Nombre</th>
            <th>Monto</th>
            <th>Tipo</th>
            <th>Ingreso</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaPrestamos"></tbody>
      </table>

    </div>

  </main>

</div>

<script src="js/admin.js"></script>
</body>
</html>
