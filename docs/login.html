<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-6 rounded shadow w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Admin Coopemao</h2>

    <input id="usuario" class="w-full mb-3 p-2 border" placeholder="Usuario">
    <input id="password" type="password" class="w-full mb-3 p-2 border" placeholder="Contraseña">

    <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">
      Entrar
    </button>
  </div>

<script src="js/login.js"></script>
</body>
</html>
