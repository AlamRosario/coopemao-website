<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso Administrativo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-green-700 to-green-900 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-96 animate-fadeIn">

    <!-- LOGO -->
    <div class="flex justify-center mb-4">
      <img src="assets/images/logo.svg" class="w-20">
    </div>

    <h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
      Acceso Administrativo
    </h2>

    <!-- USUARIO -->
    <input id="usuario"
      class="w-full mb-3 p-3 border rounded focus:outline-none focus:ring-2 focus:ring-green-600"
      placeholder="Usuario">

    <!-- PASSWORD -->
    <div class="relative">
      <input id="password" type="password"
        class="w-full mb-3 p-3 border rounded focus:outline-none focus:ring-2 focus:ring-green-600"
        placeholder="Contraseña">

      <span onclick="togglePassword()"
        class="absolute right-3 top-3 cursor-pointer text-gray-500">
        👁
      </span>
    </div>

    <!-- MENSAJE -->
    <p id="mensaje" class="text-red-500 text-sm mb-3 hidden"></p>

    <!-- BOTÓN -->
    <button onclick="login()"
      class="w-full bg-green-700 text-white p-3 rounded hover:bg-green-800 transition">
      Entrar
    </button>

  </div>

<script src="js/login.js"></script>

<style>
@keyframes fadeIn {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}
.animate-fadeIn {
  animation: fadeIn 0.6s ease;
}
</style>

</body>
</html>
